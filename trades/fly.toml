app = "trades-web-3703"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_MULTIPLAYER_WS_URL = "wss://trades-ws-3703.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
